version: '3.8'

services:
  # ============================================================
  # БАЗА ДАННЫХ 1: Справочники (только чтение)
  # ============================================================
  db-outside:
    image: mysql:8.0
    container_name: db_outside
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: outside_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_outside_data:/var/lib/mysql
      - ./init-scripts/01-outside.sql:/docker-entrypoint-initdb.d/01-outside.sql
    networks:
      - diplom_network

  # ============================================================
  # БАЗА ДАННЫХ 2: Оперативные данные (полный доступ)
  # ============================================================
  db-winder:
    image: mysql:8.0
    container_name: db_winder
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: winder_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db_winder_data:/var/lib/mysql
      - ./init-scripts/02-winder.sql:/docker-entrypoint-initdb.d/02-winder.sql
    networks:
      - diplom_network

volumes:
  db_outside_data:
  db_winder_data:

networks:
  diplom_network:
    driver: bridge